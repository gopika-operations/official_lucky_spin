<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gopika | Vòng quay may mắn</title>

  <style>
    :root{
      --gpk-green: #14B87A;
      --gpk-green-2:#0EA5A4;
      --gpk-orange:#FF8A00;
      --gpk-ink:#0B1F1A;
      --card: rgba(255,255,255,.86);
      --line: rgba(15,23,42,.10);
    }
    *{ box-sizing:border-box }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: var(--gpk-ink);
      background:
        radial-gradient(900px 500px at 15% 20%, rgba(20,184,122,.22), transparent 60%),
        radial-gradient(900px 500px at 85% 35%, rgba(255,138,0,.18), transparent 60%),
        radial-gradient(700px 500px at 50% 85%, rgba(14,165,164,.18), transparent 55%),
        linear-gradient(180deg, #f7fffb 0%, #f2fbff 55%, #ffffff 100%);
      min-height:100vh;
      overflow-x:hidden;
    }
    .wrap{ max-width: 980px; margin: 0 auto; padding: 22px 16px 40px; }
    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 14px; }
    .brand{ display:flex; align-items:center; gap:10px; user-select:none; }
    .brand img{ height:34px; width:auto; display:block; }
    .brand .txt{ display:flex; flex-direction:column; line-height:1.1; }
    .brand .txt b{ font-size:14px; letter-spacing:.2px; }
    .brand .txt span{ font-size:12px; opacity:.7; }
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border:1px solid var(--line);
      background: rgba(255,255,255,.65);
      border-radius:999px; font-size:12px;
      backdrop-filter: blur(8px);
    }
    .dot{ width:9px;height:9px;border-radius:50%; background: var(--gpk-green); box-shadow: 0 0 0 6px rgba(20,184,122,.16); }
    .grid{ display:grid; grid-template-columns: 1.05fr .95fr; gap:14px; align-items:start; }
    @media (max-width: 860px){ .grid{ grid-template-columns: 1fr; } }
    .card{
      border:1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(2,6,23,.06);
      backdrop-filter: blur(10px);
    }
    .hero h1{ margin: 2px 0 6px; font-size: 22px; letter-spacing:.2px; }
    .hero p{ margin: 0; opacity:.75; font-size: 13px; line-height: 1.45; }
    .form{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top: 12px; }
    @media (max-width: 520px){ .form{ grid-template-columns: 1fr; } }
    label{ font-size:12px; opacity:.8; display:block; margin: 0 0 6px; }
    input{
      width:100%; padding: 11px 12px; border-radius: 12px;
      border: 1px solid rgba(2,6,23,.12);
      background: rgba(255,255,255,.86);
      outline:none; font-size: 14px;
    }
    input:focus{ border-color: rgba(20,184,122,.55); box-shadow: 0 0 0 4px rgba(20,184,122,.14); }
    .actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px; }
    .btn{
      border:none; padding: 11px 14px; border-radius: 12px;
      font-weight: 800; cursor:pointer; font-size: 14px;
      display:inline-flex; align-items:center; gap:8px; user-select:none;
    }
    .btn-primary{ background: linear-gradient(135deg, var(--gpk-orange), #ff6a00); color:white; box-shadow: 0 10px 22px rgba(255,138,0,.25); }
    .btn-ghost{ background: rgba(255,255,255,.75); border: 1px solid var(--line); color: var(--gpk-ink); }
    .btn:disabled{ opacity:.55; cursor:not-allowed; box-shadow:none; }
    .status{
      margin-top: 10px; padding: 10px 12px; border-radius: 12px;
      border:1px dashed rgba(2,6,23,.15);
      background: rgba(255,255,255,.55);
      font-size: 13px; line-height: 1.45; white-space: pre-wrap;
    }

    .wheelWrap{ display:flex; flex-direction:column; align-items:center; gap:12px; }
    .wheelStage{
      position: relative; width: min(460px, 92vw); aspect-ratio: 1 / 1;
      display:grid; place-items:center; margin-top: 6px;
    }
    .wheelOuter{
      position:absolute; inset:0; border-radius: 999px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), rgba(255,255,255,.35) 55%, rgba(255,255,255,0) 70%),
        radial-gradient(circle at 70% 60%, rgba(20,184,122,.18), transparent 55%),
        radial-gradient(circle at 45% 80%, rgba(255,138,0,.18), transparent 55%);
      filter: blur(.2px);
    }
    .wheel{
      width: 86%; height: 86%; border-radius: 999px;
      position: relative; display:grid; place-items:center;
      transform: rotate(0deg);
      transition: transform 5.6s cubic-bezier(.1,.8,.15,1);
      will-change: transform;
    }
    canvas{
      width:100%; height:100%; border-radius: 999px; display:block;
      box-shadow: 0 18px 50px rgba(2,6,23,.14);
      background: rgba(255,255,255,.92);
    }
    .pointer{
      position:absolute; top: 2%; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-bottom: 28px solid var(--gpk-orange);
      filter: drop-shadow(0 8px 12px rgba(255,138,0,.22));
      z-index: 3;
    }
    .hub{
      position:absolute; width: 28%; height: 28%; border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #ffffff, rgba(255,255,255,.88) 45%, rgba(255,255,255,.75) 70%);
      border: 8px solid rgba(20,184,122,.28);
      box-shadow: 0 16px 30px rgba(2,6,23,.12);
      display:grid; place-items:center; z-index: 2;
    }
    .hub button{
      width: 78%; height: 56%; border-radius: 999px; border:none;
      cursor:pointer; font-weight: 950; letter-spacing:.2px;
      background: linear-gradient(135deg, var(--gpk-green), var(--gpk-green-2));
      color: white; box-shadow: 0 12px 22px rgba(20,184,122,.24);
    }
    .hub button:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none; }

    .result{ width:100%; display:flex; justify-content:center; }
    .pill{
      display:inline-flex; align-items:center; gap:10px; padding: 10px 12px;
      border-radius: 999px; border: 1px solid var(--line);
      background: rgba(255,255,255,.75);
      box-shadow: 0 10px 30px rgba(2,6,23,.06);
      font-size: 13px;
    }
    .pill .tag{
      background: rgba(20,184,122,.14);
      color: var(--gpk-ink);
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: 900;
    }
    .note{ width:100%; text-align:center; font-size: 12px; opacity:.75; }

    /* MODAL */
    .modal{ position:fixed; inset:0; background: rgba(0,0,0,.35);
      display:flex; align-items:center; justify-content:center; padding: 18px; z-index: 9999;
    }
    .modal.hidden{ display:none; }
    .modalCard{
      width:min(520px, 92vw); border-radius: 18px; background: rgba(255,255,255,.94);
      border: 1px solid rgba(2,6,23,.12); box-shadow: 0 22px 70px rgba(2,6,23,.20);
      backdrop-filter: blur(10px); overflow:hidden; animation: pop .18s ease-out;
    }
    @keyframes pop{ from{ transform: translateY(8px) scale(.98); opacity:.0; } to{ transform: translateY(0) scale(1); opacity:1; } }
    .modalHeader{ display:flex; align-items:center; justify-content:space-between; padding: 14px 14px 10px; }
    .modalTitle{ font-weight:950; font-size:16px; }
    .modalClose{ border:none; background:transparent; font-size:18px; cursor:pointer; padding:6px 10px; border-radius:10px; }
    .modalClose:hover{ background: rgba(2,6,23,.06); }
    .modalBody{ padding: 6px 16px 14px; text-align:center; }
    .modalPrize{
      font-weight: 1000; font-size: 24px; letter-spacing: .2px;
      background: linear-gradient(135deg, var(--gpk-orange), #ff6a00);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin: 6px 0 6px;
    }
    .modalSub{ opacity:.75; font-size:13px; }
    .modalActions{ padding: 12px 16px 16px; display:flex; justify-content:center; }
    .modalOk{
      border:none; cursor:pointer; padding: 10px 18px; border-radius: 12px; font-weight: 950;
      background: linear-gradient(135deg, var(--gpk-green), var(--gpk-green-2));
      color:#fff; box-shadow: 0 12px 22px rgba(20,184,122,.24);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img src="assets/logo.png" alt="Gopika" onerror="this.style.display='none'"/>
        <div class="txt">
          <b>Gopika</b>
          <span>Lucky Spin</span>
        </div>
      </div>

      <div class="badge">
        <span class="dot"></span>
        <span id="envText">Hệ thống sẵn sàng</span>
      </div>
    </div>

    <div class="grid">
      <div class="card hero">
        <h1>Vòng quay may mắn</h1>
        <p>
          Nhập <b>SĐT</b> và <b>CCCD</b> để kiểm tra lượt quay.
          Mỗi <b id="daysText">N</b> ngày hoạt động = <b>1</b> lượt quay.
        </p>

        <div class="form">
          <div>
            <label>SĐT</label>
            <input id="driver" placeholder="Ví dụ: 84338406668" autocomplete="off">
          </div>
          <div>
            <label>CCCD</label>
            <input id="token" placeholder="Ví dụ: 046579080213" autocomplete="off">
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-ghost" id="btnCheck">Kiểm tra lượt</button>
          <button class="btn btn-primary" id="btnSpin2" disabled>Quay ngay</button>
        </div>

        <div class="status" id="status">Trạng thái: chưa kiểm tra.</div>
      </div>

      <div class="card wheelWrap">
        <div class="wheelStage">
          <div class="wheelOuter"></div>
          <div class="pointer"></div>

          <div class="wheel" id="wheel">
            <canvas id="wheelCanvas" width="900" height="900"></canvas>
          </div>

          <div class="hub">
            <button id="btnSpin" disabled>QUAY</button>
          </div>
        </div>

        <div class="result">
          <div class="pill">
            <span class="tag">Kết quả</span>
            <span id="resultText">—</span>
          </div>
        </div>

        <div class="note" id="noteText">Hãy kiểm tra lượt trước khi quay.</div>
      </div>
    </div>
  </div>

  <!-- POPUP -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modalCard">
      <div class="modalHeader">
        <div class="modalTitle">Chúc mừng 🎉</div>
        <button id="modalClose" class="modalClose" aria-label="Đóng">✕</button>
      </div>
      <div class="modalBody">
        <div class="modalPrize" id="modalPrize">—</div>
        <div class="modalSub" id="modalSub">—</div>
      </div>
      <div class="modalActions">
        <button id="modalOk" class="modalOk">OK</button>
      </div>
    </div>
  </div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbw86ujyZbVFkP2qwMtXgsdVI74MJOoVnWTWUmX5O5-LhCOafVmoP4SMJqkABCjzvvrO/exec";
  const SPIN_MS = 5600;
  const SLICE_COUNT = 10; // số miếng hiển thị

  function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    let done = false;

    function cleanup(err){
      if(done) return;
      done = true;
      try { delete window[cb]; } catch(e) {}
      if (s.parentNode) s.parentNode.removeChild(s);
      if (err) reject(err);
    }

    // timeout (tránh treo)
    const t = setTimeout(() => cleanup(new Error("timeout")), 12000);

    window[cb] = (data) => {
      clearTimeout(t);
      cleanup();
      resolve(data);
    };

    s.onerror = () => {
      clearTimeout(t);
      cleanup(new Error("load_failed"));
    };

    // thêm callback + chống cache
    const join = url.includes("?") ? "&" : "?";
    s.src = url + join + "callback=" + cb + "&_ts=" + Date.now();

    // tăng tương thích mobile
    s.async = true;
    s.crossOrigin = "anonymous";
    s.referrerPolicy = "no-referrer";

    document.head.appendChild(s);
  });
}

  function buildUrl(base, params){
  const usp = new URLSearchParams(params);
  return base + (base.includes("?") ? "&" : "?") + usp.toString();
}

async function apiCall(action, params = {}) {
  const usp = new URLSearchParams({ action, ...params });
  const url = API + (API.includes("?") ? "&" : "?") + usp.toString();
  return await jsonp(url);
}

  // UI refs
  const driverEl = document.getElementById("driver");
  const tokenEl  = document.getElementById("token");
  const statusEl = document.getElementById("status");
  const noteEl   = document.getElementById("noteText");
  const resultEl = document.getElementById("resultText");
  const daysText = document.getElementById("daysText");

  const btnCheck = document.getElementById("btnCheck");
  const btnSpin  = document.getElementById("btnSpin");
  const btnSpin2 = document.getElementById("btnSpin2");
  const wheelEl  = document.getElementById("wheel");

  // modal
  const modal = document.getElementById("modal");
  const modalPrize = document.getElementById("modalPrize");
  const modalSub = document.getElementById("modalSub");
  const modalClose = document.getElementById("modalClose");
  const modalOk = document.getElementById("modalOk");

  function openModal(prizeText, remainAfter){
    modalPrize.textContent = prizeText || "—";
    modalSub.textContent = (remainAfter > 0)
      ? `Bạn còn ${remainAfter} lượt quay.`
      : "Bạn đã dùng hết lượt quay. Xin cảm ơn!";
    modal.classList.remove("hidden");
  }
  function closeModal(){ modal.classList.add("hidden"); }
  modalClose.addEventListener("click", closeModal);
  modalOk.addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => { if(e.target === modal) closeModal(); });

  // persist
  const LS_KEY = "gpk_lucky_spin_v2";
  try{
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
    if(saved.driver_id) driverEl.value = saved.driver_id;
    if(saved.token) tokenEl.value = saved.token;
  }catch(e){}

  function saveCreds(){
    try{
      localStorage.setItem(LS_KEY, JSON.stringify({
        driver_id: driverEl.value.trim(),
        token: tokenEl.value.trim()
      }));
    }catch(e){}
  }

  function setStatus(text, ok=true){
    statusEl.innerHTML = ok ? `✅ ${text}` : `❌ ${text}`;
  }
  function setNote(text){ noteEl.textContent = text; }
  function enableSpin(enabled){
    btnSpin.disabled = !enabled;
    btnSpin2.disabled = !enabled;
  }

  // ===== Dynamic wheel data
  let PRIZES = [];
  let PRIZE_MAP = {};   // prize_id -> prize obj
  let SLICE_IDS = [];   // list of prize_id for each slice (length = SLICE_COUNT)

  function shuffle_(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function buildSlices_(prizes, n){
    const usable = prizes.filter(p => (p.qty_left||0) > 0 && (p.ticket||0) > 0);
    const total = usable.reduce((s,p)=>s+(p.ticket||0),0) || 1;

    let counts = usable.map(p => Math.max(1, Math.round(n*(p.ticket||0)/total)));
    let sum = counts.reduce((a,b)=>a+b,0);

    while(sum > n){
      let i = counts.indexOf(Math.max(...counts));
      if(counts[i] > 1){ counts[i]--; sum--; } else break;
    }
    while(sum < n){
      let best = 0, bestScore = -1;
      for(let i=0;i<usable.length;i++){
        const score = (usable[i].ticket||0) / (counts[i]||1);
        if(score > bestScore){ bestScore = score; best = i; }
      }
      counts[best]++; sum++;
    }

    const out = [];
    usable.forEach((p, idx) => {
      for(let k=0;k<counts[idx];k++) out.push(String(p.prize_id));
    });

    return shuffle_(out).slice(0, n);
  }

  function parseAmount_(name){
    const digits = String(name||"").replace(/[^\d]/g,"");
    return Number(digits || 0);
  }

  function colorForPrize_(prize){
    const amt = parseAmount_(prize.prize_name);
    if (amt >= 300000) return "rgba(255,138,0,.88)";   // cam (giải lớn)
    if (amt >= 100000) return "rgba(20,184,122,.95)";  // xanh đậm
    if (amt > 0)       return "rgba(20,184,122,.74)";  // xanh nhạt
    return "rgba(14,165,164,.88)";                     // chữ / may mắn
  }

  async function loadPrizesAndRender(){
    const res = await apiCall("prizes");
    if(!res.ok) return;

    PRIZES = (res.prizes || []).filter(p => (p.qty_left||0) > 0 && (p.ticket||0) > 0);
    PRIZE_MAP = {};
    PRIZES.forEach(p => PRIZE_MAP[String(p.prize_id)] = p);

    SLICE_IDS = buildSlices_(PRIZES, SLICE_COUNT);
    drawWheel();
  }

  // ===== Draw wheel
  const canvas = document.getElementById("wheelCanvas");
  const ctx = canvas.getContext("2d");

  function fontForLabel(label){
    const len = String(label||"").length;
    if (len >= 18) return "900 26px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial";
    if (len >= 12) return "900 34px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial";
    return "900 44px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial";
  }

  function drawWheel(){
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;
    const r = Math.min(W,H) * 0.48;

    ctx.clearRect(0,0,W,H);

    const n = SLICE_IDS.length || 1;
    const arc = (Math.PI * 2) / n;
    const start = (-Math.PI/2) - (arc/2);

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r*1.02, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255,255,255,.95)";
    ctx.fill();
    ctx.restore();

    for(let i=0;i<n;i++){
      const a0 = start + i*arc;
      const a1 = a0 + arc;

      const prizeId = SLICE_IDS[i];
      const prize = PRIZE_MAP[prizeId] || { prize_name: String(prizeId) };

      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,a0,a1);
      ctx.closePath();
      ctx.fillStyle = colorForPrize_(prize);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,.85)";
      ctx.lineWidth = 6;
      ctx.stroke();

      const label = prize.prize_name;

      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(a0 + arc/2);
      ctx.textAlign = "right";

      const amt = parseAmount_(label);
      if (amt >= 100000) {
        ctx.fillStyle = "rgba(255,255,255,.98)";
        ctx.shadowColor = "rgba(0,0,0,.12)";
        ctx.shadowBlur = 10;
      } else {
        ctx.fillStyle = "rgba(11,31,26,.95)";
        ctx.shadowBlur = 0;
      }

      ctx.font = fontForLabel(label);
      ctx.fillText(label, r*0.82, 14);
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(cx,cy,r*0.24,0,Math.PI*2);
    ctx.fillStyle = "rgba(255,255,255,.92)";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx,cy,r*0.30,0,Math.PI*2);
    ctx.strokeStyle = "rgba(20,184,122,.35)";
    ctx.lineWidth = 18;
    ctx.stroke();
  }

  // ===== Spin math (kim chỉ đúng ô theo prize_id)
  let currentRotation = 0;

  function normalizeDeg(deg){
    let x = deg % 360;
    if (x < 0) x += 360;
    return x;
  }

  function pickSliceIndexForPrizeId(prizeId){
    const id = String(prizeId);
    const cands = [];
    for(let i=0;i<SLICE_IDS.length;i++){
      if(SLICE_IDS[i] === id) cands.push(i);
    }
    return cands.length ? cands[Math.floor(Math.random()*cands.length)] : 0;
  }

  function spinToPrizeId(prizeId){
    const n = SLICE_IDS.length || 1;
    const arcDeg = 360 / n;
    const idx = pickSliceIndexForPrizeId(prizeId);

    const margin = arcDeg * 0.18;
    const offset = (Math.random()*2 - 1) * (arcDeg/2 - margin);

    const desiredMod = normalizeDeg((-idx * arcDeg) + offset);
    const currentMod = normalizeDeg(currentRotation);

    const extraSpins = 7;
    let delta = (extraSpins * 360) + (desiredMod - currentMod);
    if (delta < extraSpins * 360) delta += 360;

    currentRotation += delta;
    wheelEl.style.transform = `rotate(${currentRotation}deg)`;
  }

  // ===== Handlers
  async function doCheck(){
    const driver_id = driverEl.value.trim();
    const token = tokenEl.value.trim();
    if(!driver_id || !token){
      setStatus("Vui lòng nhập driver_id và token.", false);
      enableSpin(false);
      return;
    }
    saveCreds();
    setStatus("Đang kiểm tra lượt...");
    setNote("Đang kết nối hệ thống…");
    enableSpin(false);

    try{
      const res = await apiCall("check", { driver_id, token });
      if(!res.ok){
        setStatus(res.error || "Không kiểm tra được.", false);
        setNote("Hãy kiểm tra đúng driver_id / token.");
        return;
      }

      daysText.textContent = res.required_days || "N";
      const remain = res.driver?.spins_remaining ?? 0;
      const earned = res.driver?.spins_earned ?? 0;
      const used = res.driver?.spins_used ?? 0;

      setStatus(`Còn ${remain} lượt (được ${earned} / đã dùng ${used}).`);
      setNote(remain > 0 ? "Bấm QUAY để nhận thưởng 🎉" : "Bạn chưa có lượt quay hoặc đã dùng hết lượt.");
      enableSpin(remain > 0);
    }catch(e){
      setStatus("Lỗi gọi API. Kiểm tra URL /exec hoặc quyền deploy.", false);
      setNote(String(e));
    }
  }

  async function doSpin(){
    const driver_id = driverEl.value.trim();
    const token = tokenEl.value.trim();
    if(!driver_id || !token){
      setStatus("Vui lòng nhập driver_id và token.", false);
      return;
    }
    saveCreds();

    enableSpin(false);
    btnCheck.disabled = true;
    resultEl.textContent = "Đang quay…";
    setNote("Đang lấy kết quả từ hệ thống…");

    try{
      const res = await apiCall("spin", { driver_id, token });
      if(!res.ok){
        resultEl.textContent = "—";
        setStatus(res.error || "Quay thất bại.", false);
        setNote("Bạn có thể bấm Kiểm tra lượt rồi thử lại.");
        btnCheck.disabled = false;
        return;
      }

      const prizeId = String(res.prize?.prize_id || "");
      const prizeName = (PRIZE_MAP[prizeId]?.prize_name) || (res.prize?.prize_name) || "—";

      // quay tới đúng ô theo prize_id
      spinToPrizeId(prizeId);

      setTimeout(async () => {
        resultEl.textContent = prizeName;

        const remainAfter = res.driver?.spins_remaining_after ?? 0;
        setStatus(`Bạn trúng: ${prizeName}. Còn ${remainAfter} lượt.`);
        setNote(remainAfter > 0 ? "Bạn còn lượt, có thể quay tiếp." : "Bạn đã dùng hết lượt. Xin cảm ơn!");
        enableSpin(remainAfter > 0);
        btnCheck.disabled = false;

        openModal(prizeName, remainAfter);

        // reload wheel theo tồn kho mới
        await loadPrizesAndRender();
      }, SPIN_MS);

    }catch(e){
      resultEl.textContent = "—";
      setStatus("Lỗi gọi API.", false);
      setNote(String(e));
      btnCheck.disabled = false;
    }
  }

  btnCheck.addEventListener("click", doCheck);
  btnSpin.addEventListener("click", doSpin);
  btnSpin2.addEventListener("click", doSpin);

  // init
  loadPrizesAndRender();
  if(driverEl.value.trim() && tokenEl.value.trim()){
    doCheck();
  }
</script>
</body>
</html>
